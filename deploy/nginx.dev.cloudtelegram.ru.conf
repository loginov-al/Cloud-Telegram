# Документация — dev.cloudtelegram.ru
# Тот же бот на 127.0.0.1:6090, Host определяет режим «docs»
#
#   sudo cp deploy/nginx.dev.cloudtelegram.ru.conf /etc/nginx/conf.d/cloudtelegram-dev.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d dev.cloudtelegram.ru

server {
    listen 80;
    server_name dev.cloudtelegram.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.cloudtelegram.ru;

    ssl_certificate     /etc/letsencrypt/live/dev.cloudtelegram.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.cloudtelegram.ru/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:6090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
