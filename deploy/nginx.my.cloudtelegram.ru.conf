# Облачный — веб-панель
# Домен: my.cloudtelegram.ru
# Бот слушает локально: 127.0.0.1:6090
#
# Установка на сервере:
#   sudo cp deploy/nginx.my.cloudtelegram.ru.conf /etc/nginx/sites-available/cloudtelegram
#   sudo ln -sf /etc/nginx/sites-available/cloudtelegram /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (если ещё нет сертификата):
#   sudo certbot --nginx -d my.cloudtelegram.ru

server {
    listen 80;
    server_name my.cloudtelegram.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name my.cloudtelegram.ru;

    # Certbot подставит пути автоматически, либо укажите вручную:
    ssl_certificate     /etc/letsencrypt/live/my.cloudtelegram.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my.cloudtelegram.ru/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:6090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
